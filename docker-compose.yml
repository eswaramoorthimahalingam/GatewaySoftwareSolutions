services:
  backend:
    image: node:20-alpine
    container_name: gateway-backend
    working_dir: /app/Backend
    command: sh -c "npm install && npm start"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: "mongodb+srv://gatewaysoftware_db_user:Gatewaysoftware%40321@gatewaysoftwaresolution.6ojni4y.mongodb.net/?appName=gatewaysoftwaresolution"
    ports:
      - "5000:5000"
    volumes:
      - ./Backend:/app/Backend
      - ./Front end:/app/Front end:ro
      - backend_node_modules:/app/Backend/node_modules
      - ./Backend/uploads:/app/Backend/uploads
    restart: unless-stopped

volumes:
  backend_node_modules:
