<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Colleges</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-4">

    <h3>Manage Partner Colleges</h3>

    <!-- Add Form -->
    <form id="addCollegeForm" enctype="multipart/form-data" class="mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">College Name</label>
                <input type="text" class="form-control" name="name" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" name="location" required>
            </div>

            <div class="col-md-4">
                <label class="form-label">Type</label>
                <select class="form-control" name="type" required>
                    <option>Engineering</option>
                    <option>Arts & Science</option>
                    <option>Deemed University</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label">College Logo</label>
                <input type="file" class="form-control" name="image" required>
            </div>

            <div class="col-md-12">
                <button class="btn btn-primary mt-3">Add College</button>
            </div>
        </div>
    </form>

    <h4>Existing Colleges</h4>
    <div id="collegeList" class="row g-3"></div>

</div>

<!-- Toast -->
<div class="toast-container position-fixed top-0 end-0 p-3">
    <div id="toastBox" class="toast text-bg-success">
        <div class="d-flex">
            <div class="toast-body" id="toastMsg"></div>
            <button class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>

<script>
const API_BASE_URL = "https://gateway-backend-wiup.onrender.com";
const API = `${API_BASE_URL}/api/college`;

function showToast(msg, ok=true){
    const toast = new bootstrap.Toast(document.getElementById("toastBox"));
    document.getElementById("toastBox").className = ok ? "toast text-bg-success" : "toast text-bg-danger";
    document.getElementById("toastMsg").innerText = msg;
    toast.show();
}

// Load Colleges
async function loadColleges() {
    const res = await fetch(API);
    const data = await res.json();

    document.getElementById("collegeList").innerHTML = data.map(c => `
        <div class="col-md-3">
            <div class="card p-2">
                <img src="${API_BASE_URL}${c.image}" height="140" class="card-img-top">
                <h5>${c.name}</h5>
                <p>${c.location}</p>
                <span class="badge bg-primary">${c.type}</span>
                <button onclick="deleteCollege('${c._id}')" class="btn btn-danger btn-sm mt-2">Delete</button>
            </div>
        </div>
    `).join("");
}
loadColleges();

// Add College
document.getElementById("addCollegeForm").onsubmit = async (e)=>{
    e.preventDefault();

    const formData = new FormData(e.target);
    const res = await fetch(`${API}/add`, { method:"POST", body:formData });
    const json = await res.json();

    showToast(json.message, json.success);
    loadColleges();
};

// Delete College
async function deleteCollege(id){
    if(!confirm("Are you sure to delete?")) return;

    const res = await fetch(`${API}/${id}`, { method:"DELETE" });
    const json = await res.json();

    showToast(json.message);
    loadColleges();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
