<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Clients</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-4">

    <h3>Manage Clients</h3>

    <!-- Toast -->
    <div class="position-fixed top-0 end-0 p-3" style="z-index:9999">
        <div id="toastBox" class="toast text-bg-primary border-0">
            <div class="d-flex">
                <div class="toast-body" id="toastMsg">Message...</div>
                <button type="button" class="btn-close btn-close-white me-2" data-bs-dismiss="toast"></button>
            </div>
        </div>
    </div>

    <!-- Add Client -->
    <form id="addClientForm" enctype="multipart/form-data" class="mb-4">
        <label>Upload Client Logo</label>
        <input type="file" class="form-control w-50" name="image" required>
        <button class="btn btn-primary mt-3">Add Client</button>
    </form>

    <h4>Existing Clients</h4>
    <div id="clientList" class="row g-3"></div>

</div>

<script>
const API = "http://localhost:5000/api/clients";

function showToast(msg, type="primary") {
    const toast = document.getElementById("toastBox");
    document.getElementById("toastMsg").innerText = msg;
    toast.className = `toast text-bg-${type}`;
    new bootstrap.Toast(toast).show();
}

// Load Clients
async function loadClients() {
    const res = await fetch(API);
    const data = await res.json();

    document.getElementById("clientList").innerHTML = data.map(c => `
        <div class="col-md-3">
            <div class="card p-2">
                <img src="http://localhost:5000${c.image}" class="card-img-top" height="150">
                <button onclick="deleteClient('${c._id}')" class="btn btn-danger mt-2">Delete</button>
            </div>
        </div>
    `).join("");
}
loadClients();

// Add Client
document.getElementById("addClientForm").onsubmit = async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const res = await fetch(`${API}/add`, { method: "POST", body: formData });
    const json = await res.json();

    showToast(json.message, json.success ? "success" : "danger");
    loadClients();
};

// Delete Client
async function deleteClient(id) {
    if (!confirm("Delete this client?")) return;

    const res = await fetch(`${API}/${id}`, { method: "DELETE" });
    const json = await res.json();

    showToast(json.message, "warning");
    loadClients();
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
